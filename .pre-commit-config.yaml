repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --strict src/
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest-fast
        name: pytest (fast)
        entry: uv run pytest -q -m "not slow and not eval" -x
        language: system
        pass_filenames: false
      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit --skip-editable
        language: system
        pass_filenames: false
      - id: f1-eval
        name: F1 corpus thresholds
        entry: uv run pytest -q -m eval
        language: system
        pass_filenames: false
        stages: [pre-push]
